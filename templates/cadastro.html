<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Abonada</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
margin-bottom:20px;
color:#1e3a8a;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>Nova Abonada</h1>

<form method="POST">

<label>Nome</label>
<input type="text" name="nome" required>

<label>Data da Abonada</label>
<input type="date" name="data_abonada" required>

<label>Setor</label>
<input type="text" name="setor" required>

<label>Trimestre</label>

<select name="trimestre">

<option>1º Trimestre</option>
<option>2º Trimestre</option>
<option>3º Trimestre</option>
<option>4º Trimestre</option>

</select>

<button type="submit">
Salvar
</button>

</form>

</div>

</body>

</html>
