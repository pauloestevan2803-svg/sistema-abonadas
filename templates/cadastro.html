<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Abonada</title>
    <style>
        body { background: #f4f6f9; padding: 30px; font-family: Arial, sans-serif; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #1e3a8a; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { display: block; width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; }
        button { display: block; margin-top: 20px; width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nova Abonada</h1>
        <form method="POST">
            <label>Nome</label>
            <input type="text" name="nome" required>

            <label>Data da Abonada</label>
            <input type="date" name="data_abonada" required>

            <label>Setor:</label>
            <select name="setor" required>
                <option value="DGI">DGI</option>
                <option value="Obras">Obras</option>
                <option value="Saude">Saúde</option>
                <option value="RH">RH</option>
            </select>

            <label>Trimestre</label>
            <select name="trimestre" required>
                <option value="1º Trimestre">1º Trimestre</option>
                <option value="2º Trimestre">2º Trimestre</option>
            </select>

            <button type="submit">Salvar</button>
        </form>
    </div>
</body>
</html>
