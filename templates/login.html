<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Abonadas</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Controle de Abonadas</h1>

        <p class="subtitulo">
            Faça login para acessar o sistema
        </p>

        <form method="POST">

             <label>Usuário</label>

             <input
             type="text"
             name="usuario"
             placeholder="Digite seu usuário"
             required>

             <label>Senha</label>

             <input
             type="password"
             name="senha"
             placeholder="Digite sua senha"
             required>

             <button type="submit">
              Entrar
             </button>

        </form>

    </div>

</body>

</html>
