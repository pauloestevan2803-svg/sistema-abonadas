<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Abonadas</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

input{
    width:300px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    background:#1e3a8a;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:left;
}

.voltar{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 20px;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="card">

<h1>Consultar Abonadas</h1>

<form method="POST">

<input
type="text"
name="pesquisa"
placeholder="Nome, setor ou data">

<button type="submit">
Pesquisar
</button>

</form>

<table>

<tr>
<th>ID</th>
<th>Nome</th>
<th>Data</th>
<th>Setor</th>
<th>Trimestre</th>
</tr>

{% for linha in resultados %}

<tr>
<td>{{ linha[0] }}</td>
<td>{{ linha[1] }}</td>
<td>{{ linha[2] }}</td>
<td>{{ linha[3] }}</td>
<td>{{ linha[4] }}</td>
</tr>

{% endfor %}

</table>

<a href="/menu" class="voltar">
Voltar ao Menu Inicial
</a>

</div>

</body>
</html>
